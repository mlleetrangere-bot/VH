name: Fetch Golf Courses

on:
  schedule:
    - cron: '0 3 * * *'  # Svaki dan u 3:00 UTC
  workflow_dispatch:       # Može se pokrenuti ručno

jobs:
  fetch-courses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch golf courses
        run: |
          # Preuzmi terene za ključne gradove NRW i okolicu
          python3 fetch_courses.py

        env:
          GOLF_API_KEY: ${{ secrets.GOLF_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add courses.json
          git diff --staged --quiet || git commit -m "Update golf courses data"
          git push
